<html lang="it">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantamondiale 2026</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede8;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9d9d99;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --green:#1D9E75;--green-dark:#0F6E56;--green-bg:#E1F5EE;--green-text:#085041;
  --red:#E24B4A;--rad-md:8px;--rad-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2c;
  --text:#f0efeb;--text2:#a8a8a4;--text3:#6b6b67;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  --green-bg:#083d2e;--green-text:#9FE1CB;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
.container{max-width:920px;margin:0 auto;padding:1rem}
header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:.75rem 0;position:sticky;top:0;z-index:50}
header .inner{max-width:920px;margin:0 auto;padding:0 1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:600;flex:1}
.hbadge{font-size:11px;background:var(--bg2);color:var(--text2);padding:2px 10px;border-radius:20px;border:.5px solid var(--border)}
nav{display:flex;gap:5px}
nav button{font-size:12px;padding:5px 12px;border-radius:var(--rad-md);border:.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px}
nav button.active{background:var(--green);color:#fff;border-color:var(--green);font-weight:500}
nav button:hover:not(.active){background:var(--bg2)}
.page{display:none;padding-top:1rem}.page.active{display:block}
.section-title{font-size:16px;font-weight:600;margin-bottom:.875rem}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rad-lg);padding:.875rem 1rem;margin-bottom:.75rem}

/* toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--green);color:#fff;padding:8px 18px;border-radius:var(--rad-md);font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* spinner */
.spinner{text-align:center;padding:2rem;color:var(--text2);font-size:13px}

/* classifica */
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{font-size:11px;color:var(--text2);text-align:left;padding:6px 8px;border-bottom:.5px solid var(--border);font-weight:500}
.rank-table td{padding:9px 8px;border-bottom:.5px solid var(--border);font-size:13px;vertical-align:middle}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tbody tr:hover td{background:var(--bg2)}
.av{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.green{color:var(--green);font-weight:600}
.bar{display:inline-block;height:6px;border-radius:3px;background:var(--green);vertical-align:middle}
.top3{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:.875rem}
.top3-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rad-lg);padding:10px 12px}

/* calendario */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.filter-bar input,.filter-bar select{font-size:12px;padding:5px 10px;border-radius:var(--rad-md);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit}
.fnote{font-size:11px;color:var(--text2);margin-bottom:8px}
.day-block{margin-bottom:1.25rem}
.day-header{font-size:12px;font-weight:600;color:var(--text2);padding:5px 0;border-bottom:.5px solid var(--border);margin-bottom:7px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.4px}
.day-badge{background:var(--green);color:#fff;font-size:10px;font-weight:500;padding:1px 8px;border-radius:10px}
.match-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rad-md);padding:9px 12px;margin-bottom:5px;cursor:pointer;transition:border-color .15s}
.match-card:hover{border-color:var(--green)}
.match-card.expanded{border-color:var(--green)}
.match-header{display:flex;align-items:center;gap:8px;user-select:none}
.mphase{font-size:10px;background:var(--bg2);padding:2px 7px;border-radius:10px;color:var(--text2);white-space:nowrap}
.mteams{flex:1;font-size:13px;font-weight:500}
.mteams span{color:var(--text2);font-weight:400}
.mresult{font-size:13px;font-weight:600;color:var(--green);min-width:45px;text-align:right}
.mvbadge{font-size:10px;background:var(--bg2);color:var(--text2);padding:2px 7px;border-radius:10px;border:.5px solid var(--border)}
.match-detail{display:none;margin-top:10px;padding-top:10px;border-top:.5px solid var(--border)}
.match-card.expanded .match-detail{display:block}
.dhead{display:grid;grid-template-columns:1fr 90px 70px;gap:6px;padding:3px 0;font-size:11px;font-weight:500;color:var(--text2);border-bottom:.5px solid var(--border);margin-bottom:2px}
.drow{display:grid;grid-template-columns:1fr 90px 70px;gap:6px;align-items:center;padding:5px 0;border-bottom:.5px solid var(--border);font-size:12px}
.drow:last-of-type{border-bottom:none}
.drow input[type=number]{width:65px;font-size:12px;padding:3px 6px;border-radius:var(--rad-md);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit}
.drow input[type=number]:focus{outline:none;border-color:var(--green)}
.result-row{margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.result-row label{font-size:12px;color:var(--text2)}
.result-row input[type=text]{width:80px;font-size:12px;padding:3px 8px;border-radius:var(--rad-md);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit}
.noplayers{font-size:12px;color:var(--text2);padding:8px 0}

/* dropdown nazionali fase elim */
.elim-teams{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.elim-teams label{font-size:12px;color:var(--text2)}
.elim-teams select{font-size:12px;padding:4px 8px;border-radius:var(--rad-md);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit}
.elim-vs{font-size:12px;color:var(--text2);font-weight:500}
.save-elim-btn{font-size:12px;padding:4px 12px;border-radius:var(--rad-md);background:var(--green);color:#fff;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.save-elim-btn:hover{background:var(--green-dark)}

/* rose */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.team-box{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rad-lg);padding:10px 12px}
.team-box-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pitem{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:.5px solid var(--border);font-size:12px}
.pitem:last-child{border-bottom:none}
.pnation{color:var(--text2);font-size:11px;min-width:80px}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>

// ── STORAGE CONDIVISO (Anthropic Artifact Storage) ──
// Tutti i dati sono salvati in shared storage → visibili a tutti
let scores={};    // matchId__playerName → voto
let results={};   // matchId → risultato stringa
let elimTeams={}; // matchId → {t1, t2}

async function loadAll(){
  try{
    const s=await window.storage.get('fm26_scores',true);
    if(s)scores=JSON.parse(s.value);
  }catch(e){scores={};}
  try{
    const r=await window.storage.get('fm26_results',true);
    if(r)results=JSON.parse(r.value);
  }catch(e){results={};}
  try{
    const e=await window.storage.get('fm26_elim',true);
    if(e)elimTeams=JSON.parse(e.value);
  }catch(e){elimTeams={};}
  // applica elim teams ai match
  MATCHES.forEach(m=>{
    if(m.elim&&elimTeams[m.id]){
      m.t1=elimTeams[m.id].t1||'';
      m.t2=elimTeams[m.id].t2||'';
    }
  });
}

async function saveScores(){
  try{await window.storage.set('fm26_scores',JSON.stringify(scores),true);}catch(e){}
}
async function saveResults(){
  try{await window.storage.set('fm26_results',JSON.stringify(results),true);}catch(e){}
}
async function saveElim(){
  try{await window.storage.set('fm26_elim',JSON.stringify(elimTeams),true);}catch(e){}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function getScore(mid,pname){ const k=mid+'__'+pname; return scores[k]!==undefined?scores[k]:''; }
async function setScore(mid,pname,val){
  const k=mid+'__'+pname;
  if(val===''||val===null){delete scores[k];}else{scores[k]=parseFloat(val)||0;}
  await saveScores();
  if(currentPage==='classifica')renderClassifica();
}
async function setResult(mid,val){
  results[mid]=val;
  await saveResults();
}
async function setElimTeams(mid,t1,t2){
  elimTeams[mid]={t1,t2};
  const m=MATCHES.find(x=>x.id===mid);
  if(m){m.t1=t1;m.t2=t2;}
  await saveElim();
  showToast('Squadre salvate ✓');
  renderCalendario();
}

// ── CALCOLI ──
function calcTeamTotal(team){
  let t=0;
  team.players.forEach(p=>{
    Object.keys(scores).forEach(k=>{
      if(k.endsWith('__'+p.name)&&typeof scores[k]==='number') t+=scores[k];
    });
  });
  return parseFloat(t.toFixed(2));
}
function getRanking(){ return [...TEAMS].sort((a,b)=>calcTeamTotal(b)-calcTeamTotal(a)); }

// ── NAVIGAZIONE ──
let currentPage='classifica';
let expandedMatch=null;
let calFilter='';
let calPhase='all';

function goPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  currentPage=page;
  if(page==='classifica')renderClassifica();
  if(page==='calendario')renderCalendario();
  if(page==='rose')renderRose();
}

// ── CLASSIFICA ──
function renderClassifica(){
  const ranked=getRanking();
  const maxTot=calcTeamTotal(ranked[0])||1;
  let html=`<p class="section-title">Classifica</p>
  <div class="card" style="padding:.5rem .75rem">
  <table class="rank-table"><thead><tr>
    <th style="width:36px">#</th><th style="width:36px"></th>
    <th>Squadra</th><th>Voti</th>
    <th style="text-align:right">Punti</th>
    <th style="text-align:right;width:140px">Barra</th>
  </tr></thead><tbody>`;
  ranked.forEach((t,i)=>{
    const av=AVATARS[TEAMS.indexOf(t)%AVATARS.length];
    const tot=calcTeamTotal(t);
    const pct=Math.max(Math.round((tot/maxTot)*120),3);
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
    let nv=0;
    t.players.forEach(p=>{ Object.keys(scores).forEach(k=>{ if(k.endsWith('__'+p.name)&&typeof scores[k]==='number')nv++; }); });
    html+=`<tr>
      <td style="text-align:center;font-weight:600">${medal}</td>
      <td><div class="av" style="background:${av.bg};color:${av.c}">${t.name.substring(0,2).toUpperCase()}</div></td>
      <td style="font-weight:500">${t.name}</td>
      <td><span style="font-size:11px;background:var(--bg2);color:var(--text2);padding:2px 8px;border-radius:10px">${nv}</span></td>
      <td style="text-align:right" class="green">${tot>0?tot.toFixed(1):'—'}</td>
      <td style="text-align:right"><div class="bar" style="width:${pct}px"></div></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;

  const withPts=ranked.filter(t=>calcTeamTotal(t)>0);
  if(withPts.length>0){
    html+=`<div class="top3">`;
    withPts.slice(0,3).forEach(t=>{
      const av=AVATARS[TEAMS.indexOf(t)%AVATARS.length];
      const tot=calcTeamTotal(t);
      const best=t.players.map(p=>{
        let pts=0;
        Object.keys(scores).forEach(k=>{ if(k.endsWith('__'+p.name)&&typeof scores[k]==='number')pts+=scores[k]; });
        return {name:p.name,pts};
      }).filter(x=>x.pts>0).sort((a,b)=>b.pts-a.pts).slice(0,4);
      html+=`<div class="top3-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div class="av" style="background:${av.bg};color:${av.c}">${t.name.substring(0,2).toUpperCase()}</div>
          <div><div style="font-size:13px;font-weight:600">${t.name}</div>
          <div style="font-size:20px;font-weight:700;color:var(--green)">${tot.toFixed(1)}</div></div>
        </div>
        ${best.map(p=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:.5px solid var(--border)">
          <span style="color:var(--text2)">${p.name}</span><span class="green">${p.pts.toFixed(1)}</span>
        </div>`).join('')}
      </div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('page-classifica').innerHTML=html;
}

// ── CALENDARIO ──
const nations_opts=ALL_NATIONS.map(n=>`<option value="${n}">${n}</option>`).join('');
function nationSelect(id,val,slot){
  return `<select onchange="elimChange('${id}','${slot}',this.value)" onclick="event.stopPropagation()">
    <option value="">— scegli —</option>${nations_opts.replace(`value="${val}"`,`value="${val}" selected`)}
  </select>`;
}

let elimPending={}; // matchId → {t1,t2} temporaneo prima del salvataggio
function elimChange(mid,slot,val){
  if(!elimPending[mid])elimPending[mid]={t1:'',t2:''};
  elimPending[mid][slot]=val;
}
function confirmElim(mid){
  const pend=elimPending[mid]||{};
  const m=MATCHES.find(x=>x.id===mid);
  const t1=pend.t1!==undefined?pend.t1:(m?m.t1:'');
  const t2=pend.t2!==undefined?pend.t2:(m?m.t2:'');
  setElimTeams(mid,t1,t2);
}

function renderCalendario(){
  const byDay={};const dayOrder=[];
  MATCHES.forEach(m=>{ if(!byDay[m.day]){byDay[m.day]=[];dayOrder.push(m.day);} byDay[m.day].push(m); });
  const phases=['all',...new Set(MATCHES.map(m=>m.phase))];

  let html=`<div class="filter-bar">
    <input type="text" placeholder="🔍 Cerca nazionale..." value="${calFilter}"
      oninput="calFilter=this.value;renderCalendario()" style="width:180px"/>
    <select onchange="calPhase=this.value;renderCalendario()">
      ${phases.map(p=>`<option value="${p}" ${calPhase===p?'selected':''}>${p==='all'?'Tutte le fasi':p}</option>`).join('')}
    </select>
    <span style="font-size:11px;background:var(--bg2);color:var(--text2);padding:2px 10px;border-radius:10px;border:.5px solid var(--border)">${MATCHES.length} partite</span>
  </div>
  <p class="fnote"><i class="ti ti-info-circle"></i> Clicca su una partita per espandere. Per le fasi eliminatorie scegli le nazionali qualificate dal menu.</p>`;

  dayOrder.forEach(day=>{
    const matches=byDay[day].filter(m=>{
      const phOk=calPhase==='all'||m.phase===calPhase;
      const label1=m.elim?(m.label1||''):'';
      const label2=m.elim?(m.label2||''):'';
      const srOk=!calFilter||
        (m.t1||'').toLowerCase().includes(calFilter.toLowerCase())||
        (m.t2||'').toLowerCase().includes(calFilter.toLowerCase())||
        m.phase.toLowerCase().includes(calFilter.toLowerCase())||
        label1.toLowerCase().includes(calFilter.toLowerCase())||
        label2.toLowerCase().includes(calFilter.toLowerCase());
      return phOk&&srOk;
    });
    if(!matches.length)return;

    html+=`<div class="day-block">
      <div class="day-header">${day}<span class="day-badge">${matches.length}</span></div>`;

    matches.forEach(m=>{
      const isExp=expandedMatch===m.id;
      const hasResult=results[m.id]&&results[m.id].trim();
      const displayT1=m.t1||(m.label1||'?');
      const displayT2=m.t2||(m.label2||'?');
      const players=m.t1&&m.t2?getPlayersInMatch(m.t1,m.t2):[];
      const nScored=players.filter(({player})=>typeof scores[m.id+'__'+player.name]==='number').length;

      html+=`<div class="match-card${isExp?' expanded':''}" onclick="toggleMatch('${m.id}')">
        <div class="match-header">
          <span class="mphase">${m.phase}</span>
          <span class="mteams">${displayT1} <span>vs</span> ${displayT2}</span>
          ${players.length>0?`<span class="mvbadge">${nScored}/${players.length} voti</span>`:''}
          <span class="mresult">${hasResult?results[m.id]:'–'}</span>
          <i class="ti ti-chevron-${isExp?'up':'down'}" style="color:var(--text2);font-size:14px"></i>
        </div>`;

      if(isExp){
        html+=`<div class="match-detail">`;
        // Se eliminatoria → mostra dropdown selezione nazioni
        if(m.elim){
          html+=`<div class="elim-teams">
            <label>Squadra 1 (${m.label1||'?'}):</label>
            ${nationSelect(m.id,m.t1||'','t1')}
            <span class="elim-vs">vs</span>
            <label>Squadra 2 (${m.label2||'?'}):</label>
            ${nationSelect(m.id,m.t2||'','t2')}
            <button class="save-elim-btn" onclick="event.stopPropagation();confirmElim('${m.id}')">Conferma</button>
          </div>`;
        }

        // Giocatori
        if(players.length===0){
          html+=`<p class="noplayers">${m.elim?'Seleziona le nazionali sopra per vedere i giocatori della lega.':'Nessun giocatore della lega in questa partita.'}</p>`;
        } else {
          html+=`<div class="dhead"><div>Giocatore / Nazione</div><div>Squadra fanta</div><div>Voto</div></div>`;
          players.forEach(({player,team})=>{
            const sc=getScore(m.id,player.name);
            html+=`<div class="drow">
              <div><div style="font-weight:500">${player.name}</div>
              <div style="font-size:11px;color:var(--text2)">${player.nation}</div></div>
              <div style="font-size:12px;color:var(--text2)">${team.name}</div>
              <div><input type="number" step=".5" min="0" max="10" placeholder="—" value="${sc}"
                oninput="setScore('${m.id}','${player.name}',this.value)"
                onclick="event.stopPropagation()"/></div>
            </div>`;
          });
        }

        html+=`<div class="result-row">
          <label>Risultato:</label>
          <input type="text" placeholder="es. 2-1" value="${results[m.id]||''}"
            onclick="event.stopPropagation()"
            onchange="setResult('${m.id}',this.value);showToast('Salvato ✓')" />
        </div></div>`;
      }
      html+=`</div>`;
    });
    html+=`</div>`;
  });

  document.getElementById('page-calendario').innerHTML=html;
}

function toggleMatch(id){ expandedMatch=expandedMatch===id?null:id; renderCalendario(); }

// ── ROSE ──
function renderRose(){
  let html=`<p class="section-title">Rose</p><div class="team-grid">`;
  TEAMS.forEach((t,i)=>{
    const av=AVATARS[i%AVATARS.length];
    const tot=calcTeamTotal(t);
    html+=`<div class="team-box">
      <div class="team-box-header">
        <div class="av" style="background:${av.bg};color:${av.c}">${t.name.substring(0,2).toUpperCase()}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${t.name}</div>
          <div style="font-size:11px;color:var(--text2)">${t.players.length} giocatori · <span class="green">${tot>0?tot.toFixed(1):'0'} pt</span></div>
        </div>
      </div><div>`;
    if(t.players.length===0){
      html+=`<div style="font-size:12px;color:var(--text2);padding:6px 0">Nessun giocatore inserito</div>`;
    } else {
      t.players.forEach(p=>{
        let pts=0,cnt=0;
        Object.keys(scores).forEach(k=>{ if(k.endsWith('__'+p.name)&&typeof scores[k]==='number'){pts+=scores[k];cnt++;} });
        html+=`<div class="pitem">
          <div class="pnation">${p.nation}</div>
          <div style="flex:1">${p.name}</div>
          <div style="font-size:11px;${cnt>0?'color:var(--green);font-weight:600':'color:var(--text3)'}">${cnt>0?pts.toFixed(1):'—'}</div>
        </div>`;
      });
    }
    html+=`</div></div>`;
  });
  html+=`</div>`;
  document.getElementById('page-rose').innerHTML=html;
}

// ── INIT ──
async function init(){
  document.getElementById('page-classifica').innerHTML=`<div class="spinner"><i class="ti ti-loader-2"></i> Caricamento dati condivisi...</div>`;
  await loadAll();
  renderClassifica();
}
init();
</script>
