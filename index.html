<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede8;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9d9d99;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --green:#1D9E75;--green-dark:#0F6E56;
  --rad-md:8px;--rad-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2c;
  --text:#f0efeb;--text2:#a8a8a4;--text3:#6b6b67;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
.container{max-width:920px;margin:0 auto;padding:1rem}
header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:.75rem 0;position:sticky;top:0;z-index:50}
header .inner{max-width:920px;margin:0 auto;padding:0 1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:600;flex:1}
.hbadge{font-size:11px;background:var(--bg2);color:var(--text2);padding:2px 10px;border-radius:20px;border:.5px solid var(--border)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px;transition:background .3s}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:#E24B4A}
nav{display:flex;gap:5px}
nav button{font-size:12px;padding:5px 12px;border-radius:var(--rad-md);border:.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px}
nav button.active{background:var(--green);color:#fff;border-color:var(--green);font-weight:500}
nav button:hover:not(.active){background:var(--bg2)}
.page{display:none;padding-top:1rem}.page.active{display:block}
.section-title{font-size:16px;font-weight:600;margin-bottom:.875rem}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rad-lg);padding:.875rem 1rem;margin-bottom:.75rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--green);color:#fff;padding:8px 18px;border-radius:var(--rad-md);font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.spinner{text-align:center;padding:3rem;color:var(--text2);font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}

/* classifica */
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{font-size:11px;color:var(--text2);text-align:left;padding:6px 8px;border-bottom:.5px solid var(--border);font-weight:500}
.rank-table td{padding:9px 8px;border-bottom:.5px solid var(--border);font-size:13px;vertical-align:middle}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tbody tr:hover td{background:var(--bg2)}
.av{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.green{color:var(--green);font-weight:600}
.bar{display:inline-block;height:6px;border-radius:3px;background:var(--green);vertical-align:middle}
.top3{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:.875rem}
.top3-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rad-lg);padding:10px 12px}

/* calendario */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.filter-bar input,.filter-bar select{font-size:12px;padding:5px 10px;border-radius:var(--rad-md);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit}
.fnote{font-size:11px;color:var(--text2);margin-bottom:8px}
.day-block{margin-bottom:1.25rem}
.day-header{font-size:12px;font-weight:600;color:var(--text2);padding:5px 0;border-bottom:.5px solid var(--border);margin-bottom:7px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.4px}
.day-badge{background:var(--green);color:#fff;font-size:10px;font-weight:500;padding:1px 8px;border-radius:10px}
.match-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rad-md);padding:9px 12px;margin-bottom:5px;cursor:pointer;transition:border-color .15s}
.match-card:hover{border-color:var(--green)}
.match-card.expanded{border-color:var(--green)}
.match-header{display:flex;align-items:center;gap:8px;user-select:none}
.mphase{font-size:10px;background:var(--bg2);padding:2px 7px;border-radius:10px;color:var(--text2);white-space:nowrap}
.mteams{flex:1;font-size:13px;font-weight:500}
.mteams span{color:var(--text2);font-weight:400}
.mresult{font-size:13px;font-weight:600;color:var(--green);min-width:45px;text-align:right}
.mvbadge{font-size:10px;background:var(--bg2);color:var(--text2);padding:2px 7px;border-radius:10px;border:.5px solid var(--border)}
.match-detail{display:none;margin-top:10px;padding-top:10px;border-top:.5px solid var(--border)}
.match-card.expanded .match-detail{display:block}
.dhead{display:grid;grid-template-columns:1fr 90px 70px;gap:6px;padding:3px 0;font-size:11px;font-weight:500;color:var(--text2);border-bottom:.5px solid var(--border);margin-bottom:2px}
.drow{display:grid;grid-template-columns:1fr 90px 70px;gap:6px;align-items:center;padding:5px 0;border-bottom:.5px solid var(--border);font-size:12px}
.drow:last-of-type{border-bottom:none}
.drow input[type=number]{width:65px;font-size:12px;padding:3px 6px;border-radius:var(--rad-md);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit}
.drow input[type=number]:focus{outline:none;border-color:var(--green)}
.result-row{margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.result-row label{font-size:12px;color:var(--text2)}
.result-row input[type=text]{width:80px;font-size:12px;padding:3px 8px;border-radius:var(--rad-md);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit}
.noplayers{font-size:12px;color:var(--text2);padding:8px 0}
.elim-box{background:var(--bg2);border-radius:var(--rad-md);padding:10px 12px;margin-bottom:10px}
.elim-box label{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:3px}
.elim-box select{font-size:12px;padding:4px 8px;border-radius:var(--rad-md);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit;width:100%;margin-bottom:8px}
.elim-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.save-elim-btn{font-size:12px;padding:5px 14px;border-radius:var(--rad-md);background:var(--green);color:#fff;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.save-elim-btn:hover{background:var(--green-dark)}

/* rose */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.team-box{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rad-lg);padding:10px 12px}
.team-box-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pitem{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:.5px solid var(--border);font-size:12px}
.pitem:last-child{border-bottom:none}
.pitem.suspended{opacity:.45}
.pitem.suspended .pname-text{text-decoration:line-through}
.pnation{color:var(--text2);font-size:11px;min-width:80px}
.susp-btn{background:transparent;border:.5px solid var(--border2);border-radius:6px;cursor:pointer;font-size:10px;padding:2px 7px;color:var(--text2);font-family:inherit;white-space:nowrap;flex-shrink:0}
.susp-btn:hover{background:var(--bg2)}
.susp-btn.active{background:#FAEEDA;color:#633806;border-color:#c8a060}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>

// ── SALVATAGGIO ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function safeKey(s){ return s.replace(/[.#$/\[\]]/g,'_'); }

// ── SOSPESI ──
let suspended={};
function isPlayerSuspended(teamId, playerName){
  const k=safeKey(teamId+'__'+playerName);
  return suspended[k]===true;
}
window.toggleSuspend=async function(teamId, playerName){
  const k=safeKey(teamId+'__'+playerName);
  const cur=suspended[k]===true;
  await set(ref(db,'suspended/'+k), cur?null:true);
  showToast(cur?'Giocatore riattivato':'Giocatore sospeso');
};

async function setScore(mid,pname,val){
  const k=safeKey(mid+'__'+pname);
  const updates={};
  if(val===''){ updates['scores/'+k]=null; }
  else{ updates['scores/'+k]=parseFloat(val)||0; }
  await update(ref(db),updates);
}
async function setResult(mid,val){
  await set(ref(db,'results/'+mid), val||null);
  showToast('Risultato salvato ✓');
}
async function setElimTeams(mid,t1,t2){
  await set(ref(db,'elim/'+mid),{t1,t2});
  showToast('Squadre salvate ✓');
}

// ── CALCOLI ──
function calcTeamTotal(team){
  let tot=0;
  team.players.forEach(p=>{
    const k=safeKey('__'+p.name);
    Object.keys(scores).forEach(sk=>{ if(sk.endsWith(k)&&typeof scores[sk]==='number') tot+=scores[sk]; });
  });
  return parseFloat(tot.toFixed(2));
}
function getRanking(){ return [...TEAMS].sort((a,b)=>calcTeamTotal(b)-calcTeamTotal(a)); }

window.goPage=function(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  currentPage=page;
  if(page==='classifica') renderClassifica();
  if(page==='rose') renderRose();
  if(page==='calendario'){
    // Aggancia listener filtri statici (una sola volta)
    const searchEl=document.getElementById('cal-search');
    const turnoEl=document.getElementById('cal-turno');
    const faseEl=document.getElementById('cal-fase');
    if(searchEl&&!searchEl._bound){
      searchEl.addEventListener('input', ()=>renderCalendario());
      turnoEl.addEventListener('change', ()=>renderCalendario());
      faseEl.addEventListener('change', ()=>renderCalendario());
      searchEl._bound=true;
    }
    renderCalendario();
  }
};

// ── CLASSIFICA ──
function renderClassifica(){
  const ranked=getRanking();
  const maxTot=calcTeamTotal(ranked[0])||1;
  let html=`<p class="section-title">Classifica</p>
  <div class="card" style="padding:.5rem .75rem">
  <table class="rank-table"><thead><tr>
    <th style="width:36px">#</th><th style="width:36px"></th>
    <th>Squadra</th><th>Voti</th>
    <th style="text-align:right">Punti</th>
    <th style="text-align:right;width:140px">Barra</th>
  </tr></thead><tbody>`;
  ranked.forEach((t,i)=>{
    const av=AVATARS[TEAMS.indexOf(t)%AVATARS.length];
    const tot=calcTeamTotal(t);
    const pct=Math.max(Math.round((tot/maxTot)*120),3);
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
    let nv=0;
    const k=safeKey('__');
    team_score_count: for(const p of t.players){
      const pk=safeKey('__'+p.name);
      for(const sk of Object.keys(scores)){ if(sk.endsWith(pk)&&typeof scores[sk]==='number')nv++; }
    }
    html+=`<tr>
      <td style="text-align:center;font-weight:600">${medal}</td>
      <td><div class="av" style="background:${av.bg};color:${av.c}">${t.name.substring(0,2).toUpperCase()}</div></td>
      <td style="font-weight:500">${t.name}</td>
      <td><span style="font-size:11px;background:var(--bg2);color:var(--text2);padding:2px 8px;border-radius:10px">${nv}</span></td>
      <td style="text-align:right" class="green">${tot>0?tot.toFixed(1):'—'}</td>
      <td style="text-align:right"><div class="bar" style="width:${pct}px"></div></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  const withPts=ranked.filter(t=>calcTeamTotal(t)>0);
  if(withPts.length){
    html+=`<div class="top3">`;
    withPts.slice(0,3).forEach(t=>{
      const av=AVATARS[TEAMS.indexOf(t)%AVATARS.length];
      const tot=calcTeamTotal(t);
      const best=t.players.map(p=>{
        let pts=0;
        const pk=safeKey('__'+p.name);
        Object.keys(scores).forEach(sk=>{ if(sk.endsWith(pk)&&typeof scores[sk]==='number')pts+=scores[sk]; });
        return {name:p.name,pts};
      }).filter(x=>x.pts>0).sort((a,b)=>b.pts-a.pts).slice(0,4);
      html+=`<div class="top3-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div class="av" style="background:${av.bg};color:${av.c}">${t.name.substring(0,2).toUpperCase()}</div>
          <div><div style="font-size:13px;font-weight:600">${t.name}</div>
          <div style="font-size:20px;font-weight:700;color:var(--green)">${tot.toFixed(1)}</div></div>
        </div>
        ${best.map(p=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:.5px solid var(--border)">
          <span style="color:var(--text2)">${p.name}</span><span class="green">${p.pts.toFixed(1)}</span>
        </div>`).join('')}
      </div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('page-classifica').innerHTML=html;
}

  const elimPhases=['Round of 32','Round of 16','Quarti di Finale','Semifinale','Terzo Posto','Finale'];
  const gironePhases=['Girone A','Girone B','Girone C','Girone D','Girone E','Girone F',
    'Girone G','Girone H','Girone I','Girone J','Girone K','Girone L'];
  const isElim=calTurno==='elim';
  const currentFase=faseEl.value;
  faseEl.innerHTML='<option value="all">'+(isElim?'Tutte le fasi elim.':'Tutti i gironi')+'</option>';
  (isElim?elimPhases:gironePhases).forEach(p=>{
    const opt=document.createElement('option');
    opt.value=p; opt.textContent=p;
    if(p===currentFase) opt.selected=true;
    faseEl.appendChild(opt);
  });
  // Se la fase corrente non è valida per il turno, resetta
  const validFases=isElim?elimPhases:gironePhases;
  if(calPhase!=='all'&&!validFases.includes(calPhase)){
    faseEl.value='all'; calPhase='all';
  }

  let html='';
  dayOrder.forEach(day=>{
    const ms=byDay[day].filter(m=>{
      const searchTerms=[m.t1||'', m.t2||'', m.label1||'', m.label2||'', m.phase||''];
      const srOk=!calFilter||searchTerms.some(s=>s.toLowerCase().includes(calFilter.toLowerCase()));
      let turnoOk=true;
      if(calTurno==='elim') turnoOk=m.elim===true;
      else if(calTurno==='1') turnoOk=!m.elim && GIRONE_ROUND[m.id]===1;
      else if(calTurno==='2') turnoOk=!m.elim && GIRONE_ROUND[m.id]===2;
      else if(calTurno==='3') turnoOk=!m.elim && GIRONE_ROUND[m.id]===3;
      const phOk=calPhase==='all'||m.phase===calPhase;
      return srOk&&turnoOk&&phOk;
    });
    if(!ms.length)return;
    html+=`<div class="day-block"><div class="day-header">${day}<span class="day-badge">${ms.length}</span></div>`;
    ms.forEach(m=>{
      const isExp=expandedMatch===m.id;
      const res=results[m.id]||'';
      const displayT1=m.t1||(m.label1||'?');
      const displayT2=m.t2||(m.label2||'?');
      const players=(m.t1&&m.t2?getPlayersInMatch(m.t1,m.t2):[]).filter(({player,team})=>!isPlayerSuspended(team.id,player.name));
      let nScored=0;
      players.forEach(({player})=>{ const k=safeKey(m.id+'__'+player.name); if(typeof scores[k]==='number')nScored++; });

      html+=`<div class="match-card${isExp?' expanded':''}" onclick="toggleMatch('${m.id}')">
        <div class="match-header">
          <span class="mphase">${m.phase}</span>
          <span class="mteams">${displayT1} <span>vs</span> ${displayT2}</span>
          ${players.length>0?`<span class="mvbadge">${nScored}/${players.length}</span>`:''}
          <span class="mresult">${res||'–'}</span>
          <i class="ti ti-chevron-${isExp?'up':'down'}" style="color:var(--text2);font-size:14px"></i>
        </div>`;

      if(isExp){
        html+=`<div class="match-detail">`;
        if(m.elim){
          html+=`<div class="elim-box">
            <div class="elim-row">
              <div>
                <label>${m.label1||'Squadra 1'}</label>
                <select onchange="elimChange('${m.id}','t1',this.value)" onclick="event.stopPropagation()">
                  <option value="">— scegli —</option>${nations_opts.replace(`value="${m.t1}"`,`value="${m.t1}" selected`)}
                </select>
              </div>
              <div>
                <label>${m.label2||'Squadra 2'}</label>
                <select onchange="elimChange('${m.id}','t2',this.value)" onclick="event.stopPropagation()">
                  <option value="">— scegli —</option>${nations_opts.replace(`value="${m.t2}"`,`value="${m.t2}" selected`)}
                </select>
              </div>
            </div>
            <button class="save-elim-btn" onclick="event.stopPropagation();confirmElim('${m.id}')"><i class="ti ti-check"></i> Conferma squadre</button>
          </div>`;
        }
        if(players.length===0){
          html+=`<p class="noplayers">${m.elim?'Seleziona le nazionali sopra per vedere i giocatori della lega.':'Nessun giocatore della lega in questa partita.'}</p>`;
        } else {
          html+=`<div class="dhead"><div>Giocatore</div><div>Squadra fanta</div><div>Voto</div></div>`;
          players.forEach(({player,team})=>{
            const k=safeKey(m.id+'__'+player.name);
            const sc=typeof scores[k]==='number'?scores[k]:'';
            html+=`<div class="drow">
              <div><div style="font-weight:500">${player.name}</div>
              <div style="font-size:11px;color:var(--text2)">${player.nation}</div></div>
              <div style="font-size:12px;color:var(--text2)">${team.name}</div>
              <div><input type="number" step=".5" min="0" max="10" placeholder="—" value="${sc}"
                oninput="setScore('${m.id}','${player.name}',this.value)"
                onclick="event.stopPropagation()"/></div>
            </div>`;
          });
        }
        html+=`<div class="result-row">
          <label>Risultato:</label>
          <input type="text" placeholder="es. 2-1" value="${res}"
            onclick="event.stopPropagation()"
            onchange="setResult('${m.id}',this.value)"/>
        </div></div>`;
      }
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('cal-list').innerHTML=html;
}

// ── ROSE ──
function renderRose(){
  let html=`<p class="section-title">Rose</p><div class="team-grid">`;
  TEAMS.forEach((t,i)=>{
    const av=AVATARS[i%AVATARS.length];
    const tot=calcTeamTotal(t);
    html+=`<div class="team-box">
      <div class="team-box-header">
        <div class="av" style="background:${av.bg};color:${av.c}">${t.name.substring(0,2).toUpperCase()}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${t.name}</div>
          <div style="font-size:11px;color:var(--text2)">${t.players.length} giocatori · <span class="green">${tot>0?tot.toFixed(1):'0'} pt</span></div>
        </div>
      </div><div>`;
    if(!t.players.length){
      html+=`<div style="font-size:12px;color:var(--text2);padding:6px 0">Nessun giocatore</div>`;
    } else {
      t.players.forEach(p=>{
        let pts=0,cnt=0;
        const pk=safeKey('__'+p.name);
        Object.keys(scores).forEach(sk=>{ if(sk.endsWith(pk)&&typeof scores[sk]==='number'){pts+=scores[sk];cnt++;} });
        const susp=isPlayerSuspended(t.id,p.name);
        html+=`<div class="pitem${susp?' suspended':''}">
          <div class="pnation">${p.nation}</div>
          <div style="flex:1" class="pname-text">${p.name}</div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;margin-right:6px;gap:1px">
            <span style="font-size:11px;${cnt?'color:var(--green);font-weight:600':'color:var(--text3)'}">${cnt?pts.toFixed(1):'—'}</span>
            ${cnt?`<span style="font-size:10px;color:var(--text3)">${cnt} part.</span>`:''}
          </div>
          <button class="susp-btn${susp?' active':''}" onclick="toggleSuspend('${t.id}','${p.name}')" title="${susp?'Riattiva':'Sospendi'}">${susp?'Riattiva':'Sospendi'}</button>
        </div>`;
      });
    }
    html+=`</div></div>`;
  });
  html+=`</div>`;
  document.getElementById('page-rose').innerHTML=html;
}

};

function apiToIt(name){ return NATION_API_MAP[name]||name; }

// Mappa partita locale → partita API tramite le squadre
function matchApiToLocal(homeIt, awayIt){
  return MATCHES.find(m=>
    !m.elim &&
    m.t1.toLowerCase()===homeIt.toLowerCase() &&
    m.t2.toLowerCase()===awayIt.toLowerCase()
  ) || MATCHES.find(m=>
    !m.elim &&
    m.t1.toLowerCase()===awayIt.toLowerCase() &&
    m.t2.toLowerCase()===homeIt.toLowerCase()
  );
}

window.syncResults = async function(){
  const btn = document.getElementById('sync-btn');
  const icon = document.getElementById('sync-icon');
  btn.style.opacity='0.6'; btn.style.pointerEvents='none';
  icon.style.animation='spin .8s linear infinite';
  showToast('Sincronizzazione in corso...');

  try {
    // Rispetta throttling: leggi header X-RequestsAvailable
    const resp = await fetch(`https://api.football-data.org/v4/competitions/${WC_ID}/matches`, {
      headers: { 'X-Auth-Token': FD_TOKEN }
    });

    if(!resp.ok){ throw new Error(`API error: ${resp.status}`); }

    const remaining = resp.headers.get('X-RequestsAvailable');
    if(remaining && parseInt(remaining) < 5){
      showToast('Rate limit quasi raggiunto, riprova tra poco');
      return;
    }

    const data = await resp.json();
    const matches = data.matches || [];
    let updated = 0;

    const fbUpdates = {};

    for(const am of matches){
      const status = am.status; // FINISHED, IN_PLAY, TIMED, etc.
      if(status !== 'FINISHED') continue;

      const homeIt = apiToIt(am.homeTeam?.name || '');
      const awayIt = apiToIt(am.awayTeam?.name || '');
      const homeScore = am.score?.fullTime?.home;
      const awayScore = am.score?.fullTime?.away;

      if(homeScore === null || homeScore === undefined) continue;

      const local = matchApiToLocal(homeIt, awayIt);
      if(!local) continue;

      // Il risultato: se squadre nell'ordine giusto o invertito
      let resStr;
      if(local.t1.toLowerCase()===homeIt.toLowerCase()){
        resStr = `${homeScore}-${awayScore}`;
      } else {
        resStr = `${awayScore}-${homeScore}`;
      }

      // Salva solo se diverso da quello già salvato
      if((results[local.id]||'') !== resStr){
        fbUpdates[`results/${local.id}`] = resStr;
        updated++;
      }
    }

    if(Object.keys(fbUpdates).length > 0){
      await update(ref(db), fbUpdates);
      showToast(`✓ ${updated} risultati aggiornati`);
    } else {
      showToast('Nessun nuovo risultato da aggiornare');
    }

  } catch(e){
    console.error(e);
    showToast('Errore sincronizzazione: '+e.message);
  } finally {
    btn.style.opacity=''; btn.style.pointerEvents='';
    icon.style.animation='';
  }
};
