    --bg2: #f5f5f3;

    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9d9d99;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-bg: #E1F5EE;
    --green-text: #085041;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2c;
      --text: #f0efeb;
      --text2: #a8a8a4;
      --text3: #6b6b67;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
      --green-bg: #083d2e;
      --green-text: #9FE1CB;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg3);
    min-height: 100vh;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 1rem; }

  header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 0.875rem 0;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  header .inner { max-width: 900px; margin: 0 auto; padding: 0 1rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 17px; font-weight: 600; flex: 1; }
  .header-badge { font-size: 11px; background: var(--bg2); color: var(--text2); padding: 2px 10px; border-radius: 20px; border: 0.5px solid var(--border); }

  nav { display: flex; gap: 6px; }
  nav button {
    font-size: 12px; padding: 5px 13px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border2);
    background: transparent; color: var(--text2);
    cursor: pointer; display: flex; align-items: center; gap: 5px;
    font-family: inherit;
  }
  nav button.active { background: var(--green); color: #fff; border-color: var(--green); font-weight: 500; }
  nav button:hover:not(.active) { background: var(--bg2); }

  .page { display: none; padding-top: 1rem; }
  .page.active { display: block; }

  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 0.875rem; }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 0.875rem 1rem;
    margin-bottom: 0.75rem;
  }

  /* ── CLASSIFICA ── */
  .rank-table { width: 100%; border-collapse: collapse; }
  .rank-table th { font-size: 11px; color: var(--text2); text-align: left; padding: 6px 8px; border-bottom: 0.5px solid var(--border); font-weight: 500; }
  .rank-table td { padding: 9px 8px; border-bottom: 0.5px solid var(--border); font-size: 13px; vertical-align: middle; }
  .rank-table tr:last-child td { border-bottom: none; }
  .rank-table tbody tr:hover td { background: var(--bg2); }
  .av { width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
  .score-green { color: var(--green); font-weight: 600; }
  .bar-mini { display: inline-block; height: 6px; border-radius: 3px; background: var(--green); vertical-align: middle; }
  .top3-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-top: 0.875rem; }
  .top3-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 10px 12px; }

  /* ── CALENDARIO ── */
  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
  .filter-bar input, .filter-bar select {
    font-size: 12px; padding: 5px 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border2);
    background: var(--bg); color: var(--text);
    font-family: inherit;
  }
  .filter-note { font-size: 11px; color: var(--text2); margin-bottom: 8px; }

  .day-block { margin-bottom: 1.25rem; }
  .day-header {
    font-size: 12px; font-weight: 600; color: var(--text2);
    padding: 5px 0; border-bottom: 0.5px solid var(--border);
    margin-bottom: 7px; display: flex; align-items: center; gap: 8px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .day-badge { background: var(--green); color: #fff; font-size: 10px; font-weight: 500; padding: 1px 8px; border-radius: 10px; }

  .match-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 9px 12px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .match-card:hover { border-color: var(--green); }
  .match-card.expanded { border-color: var(--green); }

  .match-header { display: flex; align-items: center; gap: 8px; user-select: none; }
  .match-group { font-size: 10px; background: var(--bg2); padding: 2px 7px; border-radius: 10px; color: var(--text2); white-space: nowrap; }
  .match-teams { flex: 1; font-size: 13px; font-weight: 500; }
  .match-teams span { color: var(--text2); font-weight: 400; }
  .match-result { font-size: 13px; font-weight: 600; color: var(--green); min-width: 45px; text-align: right; }
  .match-votes-badge { font-size: 10px; background: var(--bg2); color: var(--text2); padding: 2px 7px; border-radius: 10px; border: 0.5px solid var(--border); }

  .match-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
  .match-card.expanded .match-detail { display: block; }

  .detail-head {
    display: grid; grid-template-columns: 1fr 90px 70px;
    gap: 6px; padding: 3px 0;
    font-size: 11px; font-weight: 500; color: var(--text2);
    border-bottom: 0.5px solid var(--border); margin-bottom: 2px;
  }
  .detail-row {
    display: grid; grid-template-columns: 1fr 90px 70px;
    gap: 6px; align-items: center;
    padding: 5px 0; border-bottom: 0.5px solid var(--border); font-size: 12px;
  }
  .detail-row:last-of-type { border-bottom: none; }
  .detail-row input[type="number"] {
    width: 65px; font-size: 12px; padding: 3px 6px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border2);
    background: var(--bg); color: var(--text);
    font-family: inherit;
  }
  .detail-row input[type="number"]:focus { outline: none; border-color: var(--green); }

  .result-row { margin-top: 10px; display: flex; align-items: center; gap: 8px; }
  .result-row label { font-size: 12px; color: var(--text2); }
  .result-row input {
    width: 80px; font-size: 12px; padding: 3px 8px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border2);
    background: var(--bg); color: var(--text);
    font-family: inherit;
  }
  .no-players { font-size: 12px; color: var(--text2); padding: 8px 0; }

  /* ── ROSE ── */
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 10px; }
  .team-box {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 10px 12px;

  .team-box-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .player-list { font-size: 12px; }
  .player-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 0; border-bottom: 0.5px solid var(--border);
  }
  .player-item:last-child { border-bottom: none; }
  .player-item .pnation { color: var(--text2); font-size: 11px; min-width: 70px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>

// ── STATO ──
let scores={};
let results={};
try{ const s=localStorage.getItem('fm26_scores'); if(s) scores=JSON.parse(s); }catch(e){}
try{ const r=localStorage.getItem('fm26_results'); if(r) results=JSON.parse(r); }catch(e){}
// Applica risultati salvati ai match
MATCHES.forEach(m=>{ if(results[m.id]!==undefined) m.result=results[m.id]; });

function saveScores(){ try{ localStorage.setItem('fm26_scores',JSON.stringify(scores)); }catch(e){} }
function saveResults(){ try{ localStorage.setItem('fm26_results',JSON.stringify(results)); }catch(e){} }

function getScore(matchId,playerName){ const k=matchId+'__'+playerName; return scores[k]!==undefined?scores[k]:''; }
function setScore(matchId,playerName,val){
  const k=matchId+'__'+playerName;
  if(val===''||val===null){ delete scores[k]; }else{ scores[k]=parseFloat(val)||0; }
  saveScores();
  updateClassificaIfVisible();
}
function setResult(matchId,val){
  const m=MATCHES.find(x=>x.id===matchId);
  if(m){ m.result=val; results[matchId]=val; saveResults(); }
}

function calcTeamTotal(team){
  let t=0;
  team.players.forEach(p=>{
    Object.keys(scores).forEach(k=>{
      if(k.endsWith('__'+p.name)&&typeof scores[k]==='number') t+=scores[k];
    });
  });
  return parseFloat(t.toFixed(2));
}
function getRanking(){ return [...TEAMS].sort((a,b)=>calcTeamTotal(b)-calcTeamTotal(a)); }

let currentPage='classifica';
let expandedMatch=null;
let calFilter='';
let calPhase='all';

function nav(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  currentPage=page;
  if(page==='classifica') renderClassifica();
  if(page==='calendario') renderCalendario();
  if(page==='rose') renderRose();
}

function updateClassificaIfVisible(){
  if(currentPage==='classifica') renderClassifica();
}

// ── CLASSIFICA ──
function renderClassifica(){
  const ranked=getRanking();
  const maxTot=calcTeamTotal(ranked[0])||1;

  let html=`<p class="section-title">Classifica</p>
  <div class="card" style="padding:0.5rem 0.75rem">
  <table class="rank-table"><thead><tr>
    <th style="width:36px">#</th>
    <th style="width:36px"></th>
    <th>Squadra</th>
    <th>Voti inseriti</th>
    <th style="text-align:right">Punti</th>
    <th style="text-align:right;width:130px">Barre</th>
  </tr></thead><tbody>`;

  ranked.forEach((t,i)=>{
    const av=AVATARS[TEAMS.indexOf(t)%AVATARS.length];
    const tot=calcTeamTotal(t);
    const pct=Math.max(Math.round((tot/maxTot)*100),2);
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
    let nVoti=0;
    t.players.forEach(p=>{
      Object.keys(scores).forEach(k=>{ if(k.endsWith('__'+p.name)&&typeof scores[k]==='number') nVoti++; });
    });
    html+=`<tr>
      <td style="text-align:center;font-weight:600">${medal}</td>
      <td><div class="av" style="background:${av.bg};color:${av.c}">${t.name.substring(0,2).toUpperCase()}</div></td>
      <td style="font-weight:500">${t.name}</td>
      <td><span style="font-size:11px;background:var(--bg2);color:var(--text2);padding:2px 8px;border-radius:10px;">${nVoti} voti</span></td>
      <td style="text-align:right" class="score-green">${tot>0?tot.toFixed(1):'—'}</td>
      <td style="text-align:right"><div class="bar-mini" style="width:${pct}px"></div></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;

  // Card top 3
  if(ranked.some(t=>calcTeamTotal(t)>0)){
    html+=`<div class="top3-grid">`;
    ranked.slice(0,3).forEach((t,i)=>{
      const av=AVATARS[TEAMS.indexOf(t)%AVATARS.length];
      const tot=calcTeamTotal(t);
      const playerPts=t.players.map(p=>{
        let pts=0;
        Object.keys(scores).forEach(k=>{ if(k.endsWith('__'+p.name)&&typeof scores[k]==='number') pts+=scores[k]; });
        return {name:p.name,pts};
      }).filter(x=>x.pts>0).sort((a,b)=>b.pts-a.pts).slice(0,4);
      html+=`<div class="top3-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div class="av" style="background:${av.bg};color:${av.c}">${t.name.substring(0,2).toUpperCase()}</div>
          <div>
            <div style="font-size:13px;font-weight:600">${t.name}</div>
            <div style="font-size:19px;font-weight:600;color:var(--green)">${tot.toFixed(1)}</div>
          </div>
        </div>
        ${playerPts.map(p=>`
          <div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:0.5px solid var(--border)">
            <span style="color:var(--text2)">${p.name}</span>
            <span class="score-green">${p.pts.toFixed(1)}</span>
          </div>`).join('')}
      </div>`;
    });
    html+=`</div>`;
  }

  document.getElementById('page-classifica').innerHTML=html;
}

// ── CALENDARIO ──
function renderCalendario(){
  const byDay={};
  const dayOrder=[];
  MATCHES.forEach(m=>{
    if(!byDay[m.day]){ byDay[m.day]=[]; dayOrder.push(m.day); }
    byDay[m.day].push(m);
  });

  const phases=['all',...[...new Set(MATCHES.map(m=>m.phase))]];

  let html=`<div class="filter-bar">
    <input type="text" placeholder="🔍 Cerca nazionale..." value="${calFilter}"
      oninput="calFilter=this.value;renderCalendario()" style="width:180px"/>
    <select onchange="calPhase=this.value;renderCalendario()">
      ${phases.map(p=>`<option value="${p}" ${calPhase===p?'selected':''}>${p==='all'?'Tutte le fasi':p}</option>`).join('')}
    </select>
    <span style="font-size:11px;background:var(--bg2);color:var(--text2);padding:2px 10px;border-radius:10px;border:0.5px solid var(--border);">${MATCHES.length} partite</span>
  </div>
  <p class="filter-note"><i class="ti ti-info-circle"></i> Clicca su una partita per espanderla e inserire i voti. Solo i giocatori della lega presenti vengono mostrati.</p>`;

  let shown=0;
  dayOrder.forEach(day=>{
    const matches=byDay[day].filter(m=>{
      const phOk=calPhase==='all'||m.phase===calPhase;
      const srOk=!calFilter||
        m.t1.toLowerCase().includes(calFilter.toLowerCase())||
        m.t2.toLowerCase().includes(calFilter.toLowerCase())||
        m.phase.toLowerCase().includes(calFilter.toLowerCase());
      return phOk&&srOk;
    });
    if(!matches.length) return;
    shown+=matches.length;

    html+=`<div class="day-block">
      <div class="day-header">
        ${day}
        <span class="day-badge">${matches.length}</span>
      </div>`;

    matches.forEach(m=>{
      const players=getPlayersInMatch(m.t1,m.t2);
      const nScored=players.filter(({player})=>typeof scores[m.id+'__'+player.name]==='number').length;
      const isExp=expandedMatch===m.id;
      const hasResult=m.result&&m.result.trim();

      html+=`<div class="match-card${isExp?' expanded':''}" onclick="toggleMatch('${m.id}')">
        <div class="match-header">
          <span class="match-group">${m.phase}</span>
          <span class="match-teams">${m.t1} <span>vs</span> ${m.t2}</span>
          ${players.length>0?`<span class="match-votes-badge">${nScored}/${players.length} voti</span>`:''}
          <span class="match-result">${hasResult?m.result:'–'}</span>
          <i class="ti ti-chevron-${isExp?'up':'down'}" style="color:var(--text2);font-size:14px"></i>
        </div>`;

      if(isExp){
        html+=`<div class="match-detail">`;
        if(players.length===0){
          html+=`<p class="no-players">Nessun giocatore della lega in questa partita.</p>`;
        } else {
          html+=`<div class="detail-head"><div>Giocatore / Nazione</div><div>Squadra fanta</div><div>Voto</div></div>`;
          players.forEach(({player,team})=>{
            const sc=getScore(m.id,player.name);
            html+=`<div class="detail-row">
              <div>
                <div style="font-weight:500">${player.name}</div>
                <div style="font-size:11px;color:var(--text2)">${player.nation}</div>
              </div>
              <div style="font-size:12px;color:var(--text2)">${team.name}</div>
              <div>
                <input type="number" step="0.5" min="0" max="10" placeholder="—" value="${sc}"
                  oninput="setScore('${m.id}','${player.name}',this.value)"
                  onclick="event.stopPropagation()" />
              </div>
            </div>`;
          });
        }
        html+=`<div class="result-row">
          <label>Risultato:</label>
          <input type="text" placeholder="es. 2-1" value="${m.result||''}"
            onclick="event.stopPropagation()"
            onchange="setResult('${m.id}',this.value)" />
        </div>
        </div>`;
      }
      html+=`</div>`;
    });
    html+=`</div>`;
  });

  if(shown===0) html+=`<div style="text-align:center;padding:3rem;color:var(--text2);font-size:13px">Nessuna partita trovata.</div>`;
  document.getElementById('page-calendario').innerHTML=html;
}

function toggleMatch(id){
  expandedMatch=expandedMatch===id?null:id;
  renderCalendario();
}

// ── ROSE ──
function renderRose(){
  let html=`<p class="section-title">Rose</p><div class="team-grid">`;
  TEAMS.forEach((t,i)=>{
    const av=AVATARS[i%AVATARS.length];
    const tot=calcTeamTotal(t);
    html+=`<div class="team-box">
      <div class="team-box-header">
        <div class="av" style="background:${av.bg};color:${av.c}">${t.name.substring(0,2).toUpperCase()}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${t.name}</div>
          <div style="font-size:11px;color:var(--text2)">${t.players.length} giocatori · <span class="score-green">${tot>0?tot.toFixed(1):'0'} pt</span></div>
        </div>
      </div>
      <div class="player-list">`;
    t.players.forEach(p=>{
      let pts=0,cnt=0;
      Object.keys(scores).forEach(k=>{
        if(k.endsWith('__'+p.name)&&typeof scores[k]==='number'){ pts+=scores[k]; cnt++; }
      });
      html+=`<div class="player-item">
        <div class="pnation">${p.nation}</div>
        <div style="flex:1;font-size:12px">${p.name}</div>
        <div style="font-size:11px;${cnt>0?'color:var(--green);font-weight:600':'color:var(--text3)'}">
          ${cnt>0?pts.toFixed(1):'—'}
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  document.getElementById('page-rose').innerHTML=html;
}

renderClassifica();
